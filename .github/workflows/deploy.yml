name: Deploy React (Vite) site to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

# 権限設定（Pagesへのデプロイに必須）
permissions:
  contents: read
  pages: write
  id-token: write

# 同時実行制御（最新のデプロイを優先）
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js (Latest LTS)
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Setup GitHub Pages configuration
        id: pages
        uses: actions/configure-pages@v4

      - name: Install dependencies
        run: npm ci

      - name: Build project
        env:
          # 白画面防止：GitHub Pagesのサブパス（/repo-name/）を自動取得してViteに渡す
          VITE_BASE_PATH: ${{ steps.pages.outputs.base_path }}
        run: npm run build

      - name: Upload artifact for Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
